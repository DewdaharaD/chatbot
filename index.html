<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: rgba(255,255,255,0.07);
  --accent: #7c6dfa;
  --accent2: #a78bfa;
  --text: #e8e8f0;
  --text-muted: #888899;
  --bot-bg: #1e1e2e;
  --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

header { position: relative; z-index: 10; display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: rgba(15,15,19,0.9); backdrop-filter: blur(20px); flex-shrink: 0; }
.avatar { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #7c6dfa, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.header-text h1 { font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; color: var(--text); }
.status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.4} }

.main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

/* CHAT */
.chat-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; border-right: 1px solid var(--border); }
#chatbox { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
#chatbox::-webkit-scrollbar { width: 3px; }
#chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.msg-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.msg-row.user { flex-direction: row-reverse; }
.msg-icon { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.msg-row.bot .msg-icon { background: var(--surface2); }
.msg-row.user .msg-icon { background: linear-gradient(135deg, #7c6dfa, #a78bfa); }
.bubble { max-width: 78%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; }
.msg-row.bot .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
.msg-row.user .bubble { background: linear-gradient(135deg, #7c6dfa, #a78bfa); border-bottom-right-radius: 4px; color: #fff; }
.bubble h2,.bubble h3 { font-family:'DM Serif Display',serif; font-weight:400; margin:10px 0 4px; color:var(--accent2); font-size:15px; }
.bubble p { margin:5px 0; }
.bubble ul,.bubble ol { padding-left:18px; margin:5px 0; }
.bubble li { margin:3px 0; }
.bubble strong { color:#fff; font-weight:600; }
.bubble code { background:rgba(124,109,250,0.15); color:var(--accent2); padding:2px 5px; border-radius:4px; font-size:12px; font-family:monospace; }
.bubble table { border-collapse:collapse; width:100%; margin:8px 0; font-size:12px; }
.bubble th { background:rgba(124,109,250,0.2); color:var(--accent2); padding:7px 10px; text-align:left; border:1px solid rgba(124,109,250,0.2); }
.bubble td { padding:6px 10px; border:1px solid var(--border); }
.bubble tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.bubble hr { border:none; border-top:1px solid var(--border); margin:8px 0; }
.typing-bubble { background:var(--bot-bg); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:4px; padding:12px 16px; display:flex; gap:5px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}
.input-area { padding:12px 20px 16px; border-top:1px solid var(--border); background:rgba(15,15,19,0.85); backdrop-filter:blur(20px); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
#userInput { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:11px 16px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); resize:none; outline:none; transition:border-color 0.2s; line-height:1.5; min-height:44px; max-height:110px; }
#userInput::placeholder { color:var(--text-muted); }
#userInput:focus { border-color:rgba(124,109,250,0.5); }
#sendBtn { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#7c6dfa,#a78bfa); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.15s,opacity 0.15s; }
#sendBtn:hover{transform:scale(1.05)}#sendBtn:active{transform:scale(0.95)}
#sendBtn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-muted); }
.empty-icon { width:50px; height:50px; border-radius:14px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:4px; }
.empty-state p { font-size:14px; } .empty-state span { font-size:12px; opacity:0.6; }

/* GAMES PANEL */
.games-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
.games-header { padding: 14px 16px 0; flex-shrink: 0; }
.games-header p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.game-tabs { display: flex; gap: 6px; }
.tab-btn { flex: 1; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: linear-gradient(135deg,#7c6dfa,#a78bfa); color: #fff; border-color: transparent; }
.tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
.game-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.game-view { display: none; flex-direction: column; align-items: center; flex: 1; padding: 14px 16px; }
.game-view.active { display: flex; }

/* TIC TAC TOE */
.ttt-status { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; text-align: center; min-height: 20px; }
.ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 210px; }
.ttt-cell { width: 64px; height: 64px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; transition: all 0.15s; user-select: none; }
.ttt-cell:hover:not(.taken) { border-color: var(--accent); background: rgba(124,109,250,0.1); }
.ttt-cell.taken { cursor: default; }
.ttt-cell.x { color: var(--accent2); }
.ttt-cell.o { color: #f472b6; }
.ttt-cell.win { background: rgba(124,109,250,0.2); border-color: var(--accent); }
.ttt-reset { margin-top: 14px; padding: 8px 20px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.ttt-reset:hover { border-color: var(--accent); color: var(--text); }
.score-row { display: flex; gap: 8px; margin-bottom: 12px; }
.score-box { text-align: center; padding: 6px 12px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); }
.score-box .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.score-box .val { font-size: 18px; font-weight: 600; }
.score-box.x .val { color: var(--accent2); }
.score-box.o .val { color: #f472b6; }
.score-box.d .val { color: var(--text-muted); }

/* FLAPPY */
#flappyCanvas { border-radius: 10px; border: 1px solid var(--border); cursor: pointer; display: block; }
.flappy-hint { font-size: 11px; color: var(--text-muted); margin-top: 10px; text-align: center; }
.flappy-score-display { font-size: 13px; color: var(--accent2); margin-bottom: 10px; font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="avatar">✦</div>
  <div class="header-text">
    <h1>AI Assistant</h1>
    <div class="status"><div class="status-dot"></div>Online &amp; ready</div>
  </div>
</header>

<div class="main">
  <div class="chat-panel">
    <div id="chatbox">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <p>How can I help you today?</p>
        <span>Play a game on the right while you wait!</span>
      </div>
    </div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="Ask me anything..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <div class="games-panel">
    <div class="games-header">
      <p>🎮 Mini Games</p>
      <div class="game-tabs">
        <button class="tab-btn active" onclick="switchGame('ttt', this)">Tic Tac Toe</button>
        <button class="tab-btn" onclick="switchGame('flappy', this)">Flappy Bird</button>
      </div>
    </div>
    <div class="game-container">

      <!-- TIC TAC TOE -->
      <div class="game-view active" id="view-ttt">
        <div style="height:10px"></div>
        <div class="score-row">
          <div class="score-box x"><div class="label">You (X)</div><div class="val" id="scoreX">0</div></div>
          <div class="score-box d"><div class="label">Draw</div><div class="val" id="scoreD">0</div></div>
          <div class="score-box o"><div class="label">CPU (O)</div><div class="val" id="scoreO">0</div></div>
        </div>
        <div class="ttt-status" id="tttStatus">Your turn — X</div>
        <div class="ttt-grid" id="tttGrid"></div>
        <button class="ttt-reset" onclick="resetTTT()">New Game</button>
      </div>

      <!-- FLAPPY BIRD -->
      <div class="game-view" id="view-flappy">
        <div style="height:10px"></div>
        <div class="flappy-score-display">Score: <span id="flappyScore">0</span> &nbsp;|&nbsp; Best: <span id="flappyBest">0</span></div>
        <canvas id="flappyCanvas" width="268" height="330"></canvas>
        <div class="flappy-hint">Click canvas or press Space to flap</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CHATBOT ──────────────────────────────────────────
const SECRET = "B34NDMDtxn7xteCzyRMrXPpa10VYoIIZAyeBzjuPrWF9sBSP3fU0JQQJ99CDAC3pKaRAArohAAABAZBSBAAQ.AHdii5mb1wuUHgJRZfBMAHqQAyizTKCiAQqsvRfDDI6RA0v2DRz5JQQJ99CDAC3pKaRAArohAAABAZBS4Enb";
let token=null, conversationId=null, watermark=null, typingRow=null;

async function init() {
  try {
    const td = await (await fetch("https://directline.botframework.com/v3/directline/tokens/generate",{method:"POST",headers:{Authorization:`Bearer ${SECRET}`}})).json();
    token = td.token;
    const cd = await (await fetch("https://directline.botframework.com/v3/directline/conversations",{method:"POST",headers:{Authorization:`Bearer ${token}`}})).json();
    conversationId = cd.conversationId;
  } catch(e){console.error(e);}
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text||!conversationId) return;
  document.getElementById("emptyState")?.remove();
  input.value=""; input.style.height="auto";
  document.getElementById("sendBtn").disabled=true;
  addBubble("user",text); showTyping();
  await fetch(`https://directline.botframework.com/v3/directline/conversations/${conversationId}/activities`,{
    method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({type:"message",from:{id:"user1"},text})
  });
  waitForReply();
}

function showTyping(){
  const cb=document.getElementById("chatbox");
  typingRow=document.createElement("div"); typingRow.className="msg-row bot";
  typingRow.innerHTML=`<div class="msg-icon">✦</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  cb.appendChild(typingRow); cb.scrollTop=cb.scrollHeight;
}

function waitForReply(){
  const iv=setInterval(async()=>{
    try{
      const data=await(await fetch(`https://directline.botframework.com/v3/directline/conversations/${conversationId}/activities?watermark=${watermark}`,{headers:{Authorization:`Bearer ${token}`}})).json();
      watermark=data.watermark;
      const bots=(data.activities||[]).filter(a=>a.type==="message"&&a.from.id!=="user1");
      if(bots.length>0){clearInterval(iv);typingRow?.remove();bots.forEach(m=>addBubble("bot",m.text||""));document.getElementById("sendBtn").disabled=false;}
    }catch(e){console.error(e);}
  },1000);
}

function addBubble(role,text){
  const cb=document.getElementById("chatbox");
  const row=document.createElement("div"); row.className=`msg-row ${role}`;
  const icon=document.createElement("div"); icon.className="msg-icon"; icon.textContent=role==="bot"?"✦":"👤";
  const bubble=document.createElement("div"); bubble.className="bubble";
  bubble.innerHTML=role==="bot"?marked.parse(text):text;
  row.appendChild(icon); row.appendChild(bubble);
  cb.appendChild(row); cb.scrollTop=cb.scrollHeight;
}

const ta=document.getElementById("userInput");
ta.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,110)+"px";});
ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
init();

// ── GAME SWITCHER ─────────────────────────────────────
function switchGame(id, btn) {
  document.querySelectorAll(".game-view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("view-"+id).classList.add("active");
  btn.classList.add("active");
  if(id==="flappy"&&!flappyStarted) startFlappy();
}

// ── TIC TAC TOE ───────────────────────────────────────
let tttBoard=Array(9).fill(null), tttTurn="X", tttOver=false;
let scores={X:0,O:0,D:0};
const WIN_COMBOS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function renderTTT(){
  const g=document.getElementById("tttGrid"); g.innerHTML="";
  tttBoard.forEach((v,i)=>{
    const c=document.createElement("div");
    c.className="ttt-cell"+(v?" taken "+v.toLowerCase():"");
    c.textContent=v||"";
    c.onclick=()=>tttClick(i);
    g.appendChild(c);
  });
}

function tttClick(i){
  if(tttOver||tttBoard[i]||tttTurn!=="X") return;
  tttBoard[i]="X";
  const w=checkWin();
  if(w){renderTTT();highlightWin(w);endTTT("X");return;}
  if(tttBoard.every(c=>c)){endTTT("D");return;}
  tttTurn="O"; document.getElementById("tttStatus").textContent="CPU thinking...";
  renderTTT(); setTimeout(cpuMove,450);
}

function cpuMove(){
  const m=bestMove(); tttBoard[m]="O"; renderTTT();
  const w=checkWin();
  if(w){highlightWin(w);endTTT("O");return;}
  if(tttBoard.every(c=>c)){endTTT("D");return;}
  tttTurn="X"; document.getElementById("tttStatus").textContent="Your turn — X";
}

function bestMove(){
  for(let i=0;i<9;i++){if(!tttBoard[i]){tttBoard[i]="O";if(checkWin()){tttBoard[i]=null;return i;}tttBoard[i]=null;}}
  for(let i=0;i<9;i++){if(!tttBoard[i]){tttBoard[i]="X";if(checkWin()){tttBoard[i]=null;return i;}tttBoard[i]=null;}}
  if(!tttBoard[4]) return 4;
  const corners=[0,2,6,8].filter(c=>!tttBoard[c]);
  if(corners.length) return corners[Math.floor(Math.random()*corners.length)];
  const free=[0,1,2,3,4,5,6,7,8].filter(c=>!tttBoard[c]);
  return free[Math.floor(Math.random()*free.length)];
}

function checkWin(){
  for(const c of WIN_COMBOS){const[a,b,d]=c;if(tttBoard[a]&&tttBoard[a]===tttBoard[b]&&tttBoard[a]===tttBoard[d])return c;}
  return null;
}

function highlightWin(combo){
  const cells=document.querySelectorAll(".ttt-cell");
  combo.forEach(i=>cells[i].classList.add("win"));
}

function endTTT(r){
  tttOver=true;
  if(r==="X"){scores.X++;document.getElementById("tttStatus").textContent="🎉 You win!";}
  else if(r==="O"){scores.O++;document.getElementById("tttStatus").textContent="🤖 CPU wins!";}
  else{scores.D++;document.getElementById("tttStatus").textContent="🤝 Draw!";}
  document.getElementById("scoreX").textContent=scores.X;
  document.getElementById("scoreO").textContent=scores.O;
  document.getElementById("scoreD").textContent=scores.D;
}

function resetTTT(){
  tttBoard=Array(9).fill(null); tttTurn="X"; tttOver=false;
  document.getElementById("tttStatus").textContent="Your turn — X";
  renderTTT();
}
renderTTT();

// ── FLAPPY BIRD ───────────────────────────────────────
let flappyStarted=false, animId=null;

function startFlappy(){
  flappyStarted=true;
  const canvas=document.getElementById("flappyCanvas");
  const ctx=canvas.getContext("2d");
  const W=canvas.width, H=canvas.height;
  let bird,pipes,score,best,state,frame;
  best=parseInt(localStorage.getItem("fb_best")||"0");
  document.getElementById("flappyBest").textContent=best;

  function reset(){
    bird={x:60,y:H/2,vy:0,r:13};
    pipes=[]; score=0; state="idle"; frame=0;
    document.getElementById("flappyScore").textContent=0;
  }

  function flap(){
    if(state==="idle"){state="playing";}
    else if(state==="dead"){reset();return;}
    bird.vy=-6.5;
  }

  canvas.addEventListener("click",flap);
  document.addEventListener("keydown",e=>{
    if(e.code==="Space"&&document.getElementById("view-flappy").classList.contains("active")){
      e.preventDefault(); flap();
    }
  });

  const GRAVITY=0.38, PW=36, GAP=112, SPEED=2.2;

  function update(){
    frame++;
    if(state!=="playing") return;
    bird.vy+=GRAVITY; bird.y+=bird.vy;
    if(frame%90===0){
      const top=50+Math.random()*(H-GAP-100);
      pipes.push({x:W,top,scored:false});
    }
    for(const p of pipes){
      p.x-=SPEED;
      if(!p.scored&&p.x+PW<bird.x){p.scored=true;score++;document.getElementById("flappyScore").textContent=score;
        if(score>best){best=score;localStorage.setItem("fb_best",best);document.getElementById("flappyBest").textContent=best;}}
    }
    pipes=pipes.filter(p=>p.x+PW>0);
    if(bird.y-bird.r<0||bird.y+bird.r>H){state="dead";return;}
    for(const p of pipes){
      if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+PW){
        if(bird.y-bird.r<p.top||bird.y+bird.r>p.top+GAP){state="dead";return;}
      }
    }
  }

  function draw(){
    ctx.fillStyle="#12121a"; ctx.fillRect(0,0,W,H);
    // stars
    ctx.fillStyle="rgba(255,255,255,0.25)";
    for(let i=0;i<25;i++){ctx.fillRect((i*97+frame*0.15)%W,(i*61)%H,1.5,1.5);}
    // pipes
    for(const p of pipes){
      const g=ctx.createLinearGradient(p.x,0,p.x+PW,0);
      g.addColorStop(0,"#5a4fd4"); g.addColorStop(1,"#7c6dfa");
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.roundRect(p.x,0,PW,p.top,[0,0,6,6]); ctx.fill();
      ctx.beginPath(); ctx.roundRect(p.x,p.top+GAP,PW,H-p.top-GAP,[6,6,0,0]); ctx.fill();
      ctx.fillStyle="#a78bfa";
      ctx.beginPath(); ctx.roundRect(p.x-3,p.top-12,PW+6,12,4); ctx.fill();
      ctx.beginPath(); ctx.roundRect(p.x-3,p.top+GAP,PW+6,12,4); ctx.fill();
    }
    // bird
    ctx.save(); ctx.translate(bird.x,bird.y);
    ctx.rotate(Math.min(Math.max(bird.vy*0.06,-0.4),0.5));
    const bg=ctx.createRadialGradient(-2,-2,2,0,0,bird.r);
    bg.addColorStop(0,"#fff"); bg.addColorStop(1,"#a78bfa");
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,bird.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#0f0f13"; ctx.beginPath(); ctx.arc(5,-3,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(6,-4,1.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#f59e0b"; ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(16,2); ctx.lineTo(10,4); ctx.closePath(); ctx.fill();
    ctx.restore();
    // overlays
    ctx.textAlign="center";
    if(state==="idle"){
      ctx.fillStyle="rgba(15,15,19,0.55)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#e8e8f0"; ctx.font="bold 17px 'DM Sans'"; ctx.fillText("Click to start",W/2,H/2-8);
      ctx.fillStyle="#888899"; ctx.font="12px 'DM Sans'"; ctx.fillText("or press Space",W/2,H/2+14);
    }
    if(state==="dead"){
      ctx.fillStyle="rgba(15,15,19,0.7)"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#f472b6"; ctx.font="bold 20px 'DM Sans'"; ctx.fillText("Game Over!",W/2,H/2-20);
      ctx.fillStyle="#e8e8f0"; ctx.font="14px 'DM Sans'"; ctx.fillText("Score: "+score,W/2,H/2+4);
      ctx.fillStyle="#888899"; ctx.font="12px 'DM Sans'"; ctx.fillText("Click to restart",W/2,H/2+24);
    }
  }

  function loop(){update();draw();animId=requestAnimationFrame(loop);}
  reset();
  if(animId) cancelAnimationFrame(animId);
  loop();
}
</script>
</body>
</html>
